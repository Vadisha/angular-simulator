<div class="hero">
  <div class="hero__overlay"></div>

  <header class="hero__header">
    <div class="hero__container">
      <div class="hero__logo" aria-label="Логотип компании">
        <img
          class="hero__logoMark"
          src="/assets/img_logo.png"
          alt="Логотип"
        />
        <span class="hero__logoText">{{ companyName }}</span>
      </div>

      <nav class="hero__nav" aria-label="Основное меню">
        <a id="nav-home-link" class="hero__navLink" href="#">Главная</a>
        <a id="nav-tours-link" class="hero__navLink" href="#">Про тура</a>
        <a id="nav-tour-programs-link" class="hero__navLink" href="#">Программы тура</a>
        <a id="nav-stylists-link" class="hero__navLink" href="#">Стилисти</a>
        <a id="nav-blog-link" class="hero__navLink" href="#">Блог</a>
        <a id="nav-contacts-link" class="hero__navLink" href="#">Контакты</a>
      </nav>

      <button id="consultation-button" class="hero__cta" type="button">Консультация</button>
    </div>
  </header>

  <main class="hero__main">
    <div class="hero__container hero__mainInner">
      <h1 class="hero__title">НАСЛАДИСЬ ПРОГУЛКОЙ В ГОРАХ</h1>
      <div class="hero__subtitle">С КОМАНДОЙ ЕДИНОМЫШЛЕННИКОВ</div>

      <section class="hero__search" aria-label="Поиск программы">
        <div class="hero__searchGrid">
          <div class="hero__field">
            <div class="hero__fieldLabel">Локация для тура</div>
            <select id="tour-location-select" class="hero__control" name="location">
              <option selected disabled>Выберите локацию</option>
              <option>Алтай</option>
              <option>Кавказ</option>
              <option>Саяны</option>
            </select>
          </div>

          <div class="hero__field">
            <div class="hero__fieldLabel">Дата похода</div>
            <input id="hike-date-input" class="hero__control" type="date" name="date" />
          </div>

          <div class="hero__field">
            <div class="hero__fieldLabel">Участники</div>
            <select id="participants-count-select" class="hero__control" name="people">
              <option selected disabled>Выберите число</option>
              <option value="1">1 участник</option>
              <option value="2">2 участника</option>
              <option value="3">3 участника</option>
            </select>
          </div>

          <div class="hero__searchButtonWrap">
            <button id="search-program-button" class="hero__searchButton" type="button">Найти программу</button>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>
